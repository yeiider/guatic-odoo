
[options]
# =============================================================================
# CONFIGURACIÓN BÁSICA (sobreescrita por env HOST/USER/PASSWORD/PORT/DB)
# =============================================================================
admin_passwd = changeme_admin
db_host = db
db_user = postgres
db_password = postgres
db_port = 5432

# =============================================================================
# CONFIGURACIÓN DE ADDONS Y DIRECTORIOS
# =============================================================================
addons_path = /mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons
data_dir = /var/lib/odoo

# =============================================================================
# CONFIGURACIÓN CRÍTICA PARA QUEUE_JOB
# =============================================================================
server_wide_modules = base,web,queue_job,bus

# =============================================================================
# CONFIGURACIÓN DEL SERVIDOR WEB - CON WEBSOCKETS
# =============================================================================
xmlrpc_port = 8069
proxy_mode = True
longpolling_port = 8072

# =============================================================================
# CONFIGURACIÓN DE WORKERS
# =============================================================================
workers = 2
max_cron_threads = 1
queue_job_channels = root:4,webhook:2

# =============================================================================
# CONFIGURACIÓN DE MEMORIA Y LÍMITES
# =============================================================================
limit_memory_hard = 1610612736
limit_memory_soft = 1342177280
limit_time_cpu = 600
limit_time_real = 1800
limit_time_real_cron = 3600
limit_request = 8192
db_maxconn = 80

# =============================================================================
# CONFIGURACIÓN DE LOGS Y SEGURIDAD
# =============================================================================
list_db = False
without_demo = True
