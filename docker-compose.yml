services:
  odoo:
    build:
      context: ./prod
      dockerfile: Dockerfile
      args:
        ODOO_VERSION: "18"
    image: guatic-odoo:latest
    container_name: guatic-odoo
    restart: unless-stopped
    ports:
      - "8069"
      - "8072"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./odoo.prod.conf:/etc/odoo/odoo.conf:ro
      - ./addons:/mnt/extra-addons
    environment:
      HOST: ${PGHOST}
      USER: ${PGUSER:-postgres}
      PASSWORD: ${PGPASSWORD}
      DB: ${PGDATABASE:-postgres}
      PORT: ${PGPORT:-5432}

volumes:
  odoo-data:
